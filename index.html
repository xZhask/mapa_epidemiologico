<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Epidemiológico — Perú</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#F5F4F0;color:#1a1a1a;min-height:100vh}

.header{background:#fff;border-bottom:0.5px solid #ddd;padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:15px;font-weight:600;letter-spacing:-.01em}
.header span{font-size:11px;color:#888;background:#f0f0ec;padding:3px 8px;border-radius:4px}

.app{display:grid;grid-template-columns:340px 1fr;min-height:calc(100vh - 48px)}

.panel{background:#fff;border-right:0.5px solid #ddd;padding:1.25rem;overflow-y:auto;height:calc(100vh - 48px)}
.map-area{background:#F5F4F0;padding:1.5rem;display:flex;flex-direction:column;align-items:center;overflow-y:auto;height:calc(100vh - 48px)}

.section-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#999;margin-bottom:.5rem;margin-top:1rem}
.section-label:first-child{margin-top:0}

.disease-row{display:flex;align-items:center;gap:8px;margin-bottom:.4rem;background:#fafaf8;border:0.5px solid #e5e5e0;border-radius:8px;padding:.5rem .75rem}
.disease-row input[type=text]{border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;color:#1a1a1a;flex:1;outline:none}
.disease-row input[type=text]::placeholder{color:#bbb}
.color-swatch{width:24px;height:24px;border-radius:5px;cursor:pointer;border:0.5px solid #ccc;flex-shrink:0;position:relative;overflow:hidden}
.color-swatch input[type=color]{position:absolute;inset:-4px;opacity:0;cursor:pointer;width:140%;height:140%}
.remove-btn{width:20px;height:20px;border-radius:50%;border:0.5px solid #ddd;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:15px;flex-shrink:0;line-height:1;transition:all .15s}
.remove-btn:hover{background:#fee2e2;border-color:#fca5a5;color:#dc2626}

.add-btn{width:100%;padding:.5rem;border:0.5px dashed #ccc;border-radius:8px;background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;color:#888;margin-bottom:.5rem;transition:all .15s}
.add-btn:hover{background:#f5f4f0;border-color:#aaa;color:#555}

.dept-table-wrap{border:0.5px solid #e5e5e0;border-radius:8px;overflow-x:auto;overflow-y:hidden;margin-bottom:.75rem}
.dept-table{width:100%;border-collapse:collapse}
.dept-table thead{background:#f5f4f0}
.dept-table th{font-size:10px;color:#888;font-weight:600;padding:6px 8px;border-bottom:0.5px solid #e5e5e0;text-align:left;white-space:nowrap}
.dept-table td{padding:2px 4px;border-bottom:0.5px solid #f0eeea}
.dept-table tr:last-child td{border-bottom:none}
.dept-table tr:hover td{background:#fafaf8}
.dept-name{font-size:11px;color:#555;padding:3px 6px;white-space:nowrap;position:sticky;left:0;z-index:1;background:#fff}
.dept-table tr:hover .dept-name{background:#fafaf8}
.dept-table thead th:first-child{position:sticky;left:0;z-index:2;background:#f5f4f0}
.dept-input{width:60px;border:none;background:transparent;font-family:'DM Mono','DM Sans',sans-serif;font-size:12px;color:#1a1a1a;text-align:right;padding:3px 6px;outline:none;border-radius:4px;transition:background .1s}
.dept-input:focus{background:#f0eeea}
.totals-row td{border-top:1px solid #d0cec8;background:#f0eeea;padding:4px 4px}
.totals-row .dept-name{background:#f0eeea;color:#888;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.totals-row .total-val{font-family:'DM Mono','DM Sans',sans-serif;font-size:12px;font-weight:700;color:#1a1a1a;text-align:right;padding:4px 10px;white-space:nowrap}

.btn{width:100%;padding:.6rem 1rem;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:0.5px solid #ccc;background:#fff;color:#1a1a1a;margin-bottom:.4rem;transition:all .15s;text-align:center}
.btn:hover{background:#f5f4f0}
.btn.primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn.primary:hover{background:#333}
.btn.danger{border-color:#fca5a5;color:#dc2626}
.btn.danger:hover{background:#fee2e2}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}

.map-card{background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:1.25rem;width:100%;max-width:560px;margin-bottom:1rem}
.legend-card{background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:1rem 1.25rem;width:100%;max-width:560px;margin-bottom:1rem;text-align:center}
.legend-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#999;margin-bottom:.6rem}
.legend-grid{display:flex;flex-wrap:wrap;gap:.4rem .75rem;justify-content:center}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:#555}
.legend-item.multi{font-size:13px}
.legend-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}

.export-card{background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:1rem 1.25rem;width:100%;max-width:560px}
.export-card .section-label{margin-top:0}
.export-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.4rem;margin-top:.5rem}
.export-btn{padding:.5rem;border:0.5px solid #ccc;border-radius:7px;background:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:#444;transition:all .15s;text-align:center}
.export-btn:hover{background:#f5f4f0;border-color:#aaa}

.tooltip{position:fixed;background:#fff;border:0.5px solid #ccc;border-radius:7px;padding:7px 11px;font-size:12px;color:#333;pointer-events:none;display:none;z-index:9999;box-shadow:0 2px 8px rgba(0,0,0,.08);line-height:1.6}

.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;margin-left:4px}
.badge.single{background:#fffbe6;color:#b45309;border:0.5px solid #fcd34d}
.badge.multi{background:#eef2ff;color:#4338ca;border:0.5px solid #a5b4fc}

.merge-row{display:flex;align-items:center;margin-bottom:.5rem;padding:.35rem .6rem;background:#fafaf8;border:0.5px solid #e5e5e0;border-radius:8px}
.merge-row label{display:flex;align-items:center;gap:7px;font-size:12px;color:#555;cursor:pointer;user-select:none;width:100%}
.merge-row input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:#1a1a1a;flex-shrink:0}

@media print{
  .panel,.header,.export-card{display:none!important}
  .app{grid-template-columns:1fr}
  .map-area{height:auto}
}
</style>
</head>
<body>

<div class="header">
  <h1>Mapa Epidemiológico — Perú</h1>
  <span id="mode-badge">sin datos</span>
</div>

<div class="tooltip" id="tooltip"></div>

<div class="app">
  <!-- PANEL IZQUIERDO -->
  <div class="panel">
    <div class="section-label">Enfermedades</div>
    <div id="diseases-list"></div>
    <button class="add-btn" onclick="addDisease()">+ agregar enfermedad</button>
    <div class="section-label">Casos por departamento</div>
    <div class="dept-table-wrap">
      <table class="dept-table">
        <thead><tr id="table-head"><th>Departamento</th><th style="text-align:right">—</th></tr></thead>
        <tbody id="dept-body"></tbody>
      </table>
    </div>
    <div class="merge-row">
      <label>
        <input type="checkbox" id="merge-callao" checked onchange="onMergeCallaoChange()">
        Unir Lima-Callao
      </label>
    </div>

    <button class="btn primary" onclick="renderMap()">generar mapa</button>
    <div class="btn-row">
      <button class="btn" onclick="clearAll()">limpiar todo</button>
      <button class="btn" onclick="importCSV()">importar CSV</button>
    </div>
    <input type="file" id="csv-input" accept=".csv" style="display:none" onchange="handleCSV(event)">
  </div>

  <!-- PANEL DERECHO -->
  <div class="map-area" id="map-area">
    <div class="map-card" id="map-card">

      <svg id="peru-map" viewBox="0 0 473.63 695.12" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-height:560px;display:block"></svg>
    </div>

    <div class="legend-card" id="legend-card" style="display:none">

      <div class="legend-grid" id="legend-grid"></div>
    </div>

    <div class="export-card">
      <div class="section-label">Exportar</div>
      <div class="export-row">
        <button class="export-btn" onclick="exportPNG()">PNG (alta res)</button>
        <button class="export-btn" onclick="exportSVG()">SVG editable</button>
        <button class="export-btn" onclick="window.print()">Imprimir</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
// ─── DATOS ────────────────────────────────────────────────
const DEPTS = [
  "Amazonas","Áncash","Apurímac","Arequipa","Ayacucho",
  "Cajamarca","Callao","Cusco","Huancavelica","Huánuco",
  "Ica","Junín","La Libertad","Lambayeque","Lima",
  "Loreto","Madre de Dios","Moquegua","Pasco","Piura",
  "Puno","San Martín","Tacna","Tumbes","Ucayali"
];

const SVG_VIEWBOX = "0 0 473.63 695.12";
const SVG_WIDTH   = 473.63;
const SVG_HEIGHT  = 695.12;

// Mapeo: nombre en DEPTS → id del elemento en el SVG
const SVG_ID_MAP = {
  "Amazonas":      "Amazonas",
  "Áncash":        "Ancash",
  "Apurímac":      "Apurimac",
  "Arequipa":      "Arequipa",
  "Ayacucho":      "Ayacucho",
  "Cajamarca":     "Cajamarca",
  "Callao":        "Callao",
  "Cusco":         "Cuzco",
  "Huancavelica":  "Huancavelica",
  "Huánuco":       "Huanuco",
  "Ica":           "Ica",
  "Junín":         "Junin",
  "La Libertad":   "La_Libertad",
  "Lambayeque":    "Lambayeque",
  "Lima":          "Lima",
  "Loreto":        "Loreto",
  "Madre de Dios": "Madre_de_Dios",
  "Moquegua":      "Moquegua",
  "Pasco":         "Pasco",
  "Piura":         "Piura",
  "Puno":          "Puno",
  "San Martín":    "San_Martin",
  "Tacna":         "Tacna",
  "Tumbes":        "Tumbes",
  "Ucayali":       "Ucayali"
};

let REAL_DEPT_PATHS = {};

const DEPT_CENTERS = {
  "Tumbes":        [32, 140],  "Piura":         [55, 182],
  "Lambayeque":    [78, 252],  "La Libertad":   [112, 308],
  "Cajamarca":     [100, 240], "Áncash":        [150, 362],
  "Amazonas":      [118, 178], "San Martín":    [185, 248],
  "Loreto":        [218, 150], "Huánuco":       [225, 354],
  "Pasco":         [228, 390], "Ucayali":       [305, 374],
  "Junín":         [222, 422], "Lima":          [140, 432],
  "Callao":        [152, 455], "Ica":           [215, 558],
  "Huancavelica":  [228, 484], "Ayacucho":      [258, 528],
  "Apurímac":      [330, 505], "Cusco":         [318, 488],
  "Madre de Dios": [412, 448], "Arequipa":      [295, 598],
  "Moquegua":      [380, 626], "Puno":          [418, 568],
  "Tacna":         [398, 662]
};

const SMALL_DEPTS = new Set(["Callao","Tumbes","Lambayeque"]);

const PRESET_COLORS = ['#c0392b','#2a6fca','#f4a456','#22b198','#ee751c',
  '#379964','#be2651','#474787','#30336b','#0a3d62',
  '#784212','#1F618D','#196F3D','#6C3483','#7B241C'];

// ─── CARGA SVG REAL ────────────────────────────────────────
async function loadSVG(){
  try {
    const res = await fetch('img/mapa_peru.svg');
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(text, 'image/svg+xml');
    doc.querySelectorAll('path[id]').forEach(path => {
      const svgId = path.id;
      const dept = Object.keys(SVG_ID_MAP).find(k => SVG_ID_MAP[k] === svgId);
      if(dept) REAL_DEPT_PATHS[dept] = path.getAttribute('d');
    });
    document.getElementById('peru-map').setAttribute('viewBox', SVG_VIEWBOX);
    console.log(`Mapa SVG cargado: ${Object.keys(REAL_DEPT_PATHS).length} departamentos`);
  } catch(err){
    console.error('Error cargando SVG:', err);
    console.error('Error: no se pudo cargar el mapa SVG. Verifique que el servidor esté activo.');
  }
}

// ─── ESTADO ────────────────────────────────────────────────
let diseases = [];
let deptData = {};

function initDeptData(){
  DEPTS.forEach(d => { if(!deptData[d]) deptData[d] = {}; });
}

// ─── UI: LISTA DE ENFERMEDADES ─────────────────────────────
function addDisease(){
  const idx = diseases.length;
  diseases.push({ name:'', color: PRESET_COLORS[idx % PRESET_COLORS.length] });
  renderDiseaseList();
  renderDeptTable();
}

function removeDisease(i){
  diseases.splice(i,1);
  renderDiseaseList();
  renderDeptTable();
}

function renderDiseaseList(){
  const el = document.getElementById('diseases-list');
  el.innerHTML = '';
  diseases.forEach((d,i) => {
    const row = document.createElement('div');
    row.className = 'disease-row';
    row.innerHTML = `
      <div class="color-swatch" style="background:${d.color}" title="Clic para cambiar color">
        <input type="color" value="${d.color}"
          onchange="diseases[${i}].color=this.value;this.parentElement.style.background=this.value;renderDeptTable()">
      </div>
      <input type="text" placeholder="nombre enfermedad (ej: Dengue)"
        value="${d.name}" oninput="diseases[${i}].name=this.value;updateTableHeader()">
      <button class="remove-btn" onclick="removeDisease(${i})" title="Eliminar">×</button>
    `;
    el.appendChild(row);
  });
}

function updateTableHeader(){
  const headRow = document.getElementById('table-head');
  headRow.innerHTML = '<th>Departamento</th>';
  if(diseases.length === 0){
    headRow.innerHTML += '<th style="text-align:right">—</th>';
  } else if(diseases.length === 1){
    headRow.innerHTML += `<th style="text-align:right">${diseases[0].name || 'Casos'}</th>`;
  } else {
    diseases.forEach((d, i) => {
      headRow.innerHTML += `<th style="text-align:right;color:${d.color};font-weight:600">${d.name || 'E'+(i+1)}</th>`;
    });
  }
}

// ─── UI: TABLA DE DEPARTAMENTOS ────────────────────────────
function renderDeptTable(){
  const tbody = document.getElementById('dept-body');
  tbody.innerHTML = '';
  updateTableHeader();
  const mergeCallao = document.getElementById('merge-callao').checked;

  DEPTS.forEach(dept => {
    if(mergeCallao && dept === 'Callao') return;
    const tr = document.createElement('tr');
    let cells = `<td class="dept-name">${dept}</td>`;
    const count = Math.max(diseases.length, 1);
    for(let i = 0; i < diseases.length || (diseases.length === 0 && i === 0); i++){
      const val = (deptData[dept] && deptData[dept][i]) || '';
      const w = diseases.length > 3 ? '48px' : '60px';
      cells += `<td style="text-align:right">
        <input class="dept-input" type="number" min="0" placeholder="0"
          style="width:${w}" value="${val}"
          oninput="setCase('${dept}',${i},this.value)">
      </td>`;
      if(diseases.length === 0) break;
    }
    tr.innerHTML = cells;
    tbody.appendChild(tr);
  });

  const totRow = document.createElement('tr');
  totRow.id = 'totals-row';
  totRow.className = 'totals-row';
  tbody.appendChild(totRow);
  updateTotalsRow();
}

function updateTotalsRow(){
  const row = document.getElementById('totals-row');
  if(!row) return;
  const mergeCallao = document.getElementById('merge-callao').checked;
  let cells = `<td class="dept-name">Total</td>`;
  const hasDiseases = diseases.length > 0;
  const count = hasDiseases ? diseases.length : 1;
  for(let i = 0; i < count; i++){
    let sum = 0;
    DEPTS.forEach(dept => {
      if(mergeCallao && dept === 'Callao') return;
      sum += (deptData[dept] && deptData[dept][i]) ? (parseInt(deptData[dept][i]) || 0) : 0;
    });
    cells += `<td class="total-val">${sum > 0 ? sum.toLocaleString('es-PE') : '—'}</td>`;
    if(!hasDiseases) break;
  }
  row.innerHTML = cells;
}

function setCase(dept, diseaseIdx, val){
  if(!deptData[dept]) deptData[dept] = {};
  deptData[dept][diseaseIdx] = val === '' ? 0 : (parseInt(val) || 0);
  updateTotalsRow();
}

// ─── COLOR ─────────────────────────────────────────────────
function hexToRgb(hex){
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function blendToWhite(hex, factor){
  // factor 1.0 = color puro, 0.0 = blanco
  const {r,g,b} = hexToRgb(hex);
  const mix = c => Math.round(c + (255-c)*(1-factor));
  return `rgb(${mix(r)},${mix(g)},${mix(b)})`;
}

// ─── RENDER MAPA ──────────────────────────────────────────
function renderMap(){
  if(Object.keys(REAL_DEPT_PATHS).length === 0){
    alert('El mapa SVG aún no ha terminado de cargar. Espere un momento e intente de nuevo.');
    return;
  }
  const svg = document.getElementById('peru-map');
  svg.innerHTML = '';
  svg.setAttribute('viewBox', SVG_VIEWBOX);

  const colorMap = {};
  const legendItems = [];
  const multiDisease = diseases.length > 1;
  const mergeCallao = document.getElementById('merge-callao').checked;

  if(diseases.length === 0){
    // Solo dibujar mapa vacío
    DEPTS.forEach(dept => drawDept(svg, dept, '#e8e8e8', null));

  } else if(diseases.length === 1){
    // UNA ENFERMEDAD → tonalidades automáticas
    const d = diseases[0];
    const casesArr = DEPTS.map(dept => {
      const effectiveDept = (mergeCallao && dept === 'Callao') ? 'Lima' : dept;
      return { dept, val: parseInt(deptData[effectiveDept]?.[0]) || 0 };
    });
    const withCases = casesArr.filter(x => x.val > 0).sort((a,b) => b.val - a.val);
    const allBelowFive = withCases.every(x => x.val < 5);
    const distinctVals = [...new Set(withCases.map(x => x.val))].sort((a,b) => b-a);
    const m = distinctVals.length;

    withCases.forEach(item => {
      let factor;
      if(allBelowFive || m === 1){
        factor = 1.0;
      } else {
        const rank = distinctVals.indexOf(item.val);
        // floor mínimo sube cuando hay pocos valores distintos para evitar tonos imperceptibles
        const minFactor = Math.max(0.20, 0.60 - m * 0.08);
        factor = 1.0 - (rank / (m - 1)) * (1.0 - minFactor);
      }
      colorMap[item.dept] = blendToWhite(d.color, factor);
    });

    DEPTS.forEach(dept => {
      drawDept(svg, dept, colorMap[dept] || '#e8e8e8', null);
    });

    // Leyenda: omitir Callao cuando está unido a Lima
    withCases.forEach(item => {
      if(mergeCallao && item.dept === 'Callao') return;
      legendItems.push({
        color: colorMap[item.dept],
        label: `${item.dept}: ${item.val.toLocaleString()} casos`
      });
    });

  } else {
    // MÚLTIPLES ENFERMEDADES → colores sólidos
    diseases.forEach((d, di) => {
      DEPTS.forEach(dept => {
        const effectiveDept = (mergeCallao && dept === 'Callao') ? 'Lima' : dept;
        const val = parseInt(deptData[effectiveDept]?.[di]) || 0;
        if(val > 0){
          if(!colorMap[dept]) colorMap[dept] = [];
          colorMap[dept].push({ color: d.color, name: d.name || `E${di+1}`, val });
        }
      });
      const hasAny = DEPTS.some(dept => {
        const eff = (mergeCallao && dept === 'Callao') ? 'Lima' : dept;
        return (parseInt(deptData[eff]?.[di]) || 0) > 0;
      });
      if(hasAny){
        legendItems.push({ color: d.color, label: d.name || `Enfermedad ${di+1}` });
      }
    });

    DEPTS.forEach(dept => {
      if(colorMap[dept]){
        if(colorMap[dept].length === 1){
          drawDept(svg, dept, colorMap[dept][0].color, null);
        } else {
          drawDeptStripes(svg, dept, colorMap[dept].map(e => e.color));
        }
      } else {
        drawDept(svg, dept, '#e8e8e8', null);
      }
    });
  }

  addLabels(svg);

  const badge = document.getElementById('mode-badge');
  if(diseases.length === 0) badge.textContent = 'sin datos';
  else if(diseases.length === 1){ badge.textContent = 'tonalidades'; badge.className='badge single'; }
  else { badge.textContent = `${diseases.length} enfermedades`; badge.className='badge multi'; }

  renderLegend(legendItems);
}

function drawDept(svg, dept, fill, strokeColor){
  const p = REAL_DEPT_PATHS[dept];
  if(!p) return;
  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d', p);
  path.setAttribute('fill', fill);
  path.setAttribute('stroke', '#fff');
  path.setAttribute('stroke-width', '1.2');
  path.setAttribute('stroke-linejoin', 'round');
  path.setAttribute('data-dept', dept);
  path.style.cursor = 'pointer';
  path.style.transition = 'opacity .15s';
  path.addEventListener('mousemove', e => showTip(e, dept));
  path.addEventListener('mouseleave', hideTip);
  path.addEventListener('mouseenter', function(){ this.style.opacity='.8'; });
  path.addEventListener('mouseleave', function(){ this.style.opacity='1'; });
  svg.appendChild(path);
}

function drawDeptStripes(svg, dept, colors){
  const p = REAL_DEPT_PATHS[dept];
  if(!p) return;
  const n = colors.length;

  // Obtener el bounding box real del departamento
  const tmpPath = document.createElementNS('http://www.w3.org/2000/svg','path');
  tmpPath.setAttribute('d', p);
  svg.appendChild(tmpPath);
  const bbox = tmpPath.getBBox();
  svg.removeChild(tmpPath);

  const defs = svg.querySelector('defs') || (() => {
    const d = document.createElementNS('http://www.w3.org/2000/svg','defs');
    svg.insertBefore(d, svg.firstChild);
    return d;
  })();

  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('data-dept', dept);
  g.style.cursor = 'pointer';
  g.addEventListener('mousemove', e => showTip(e, dept));
  g.addEventListener('mouseleave', hideTip);

  const horizontal = n > 1;
  for(let i = 0; i < n; i++){
    const clipId = `clip-${dept.replace(/\s/g,'_')}-${i}`;
    const clipPath = document.createElementNS('http://www.w3.org/2000/svg','clipPath');
    clipPath.setAttribute('id', clipId);
    const clipRect = document.createElementNS('http://www.w3.org/2000/svg','rect');
    if(horizontal){
      clipRect.setAttribute('x',      bbox.x);
      clipRect.setAttribute('y',      bbox.y + (i / n) * bbox.height);
      clipRect.setAttribute('width',  bbox.width);
      clipRect.setAttribute('height', bbox.height / n);
    } else {
      clipRect.setAttribute('x',      bbox.x + (i / n) * bbox.width);
      clipRect.setAttribute('y',      bbox.y);
      clipRect.setAttribute('width',  bbox.width / n);
      clipRect.setAttribute('height', bbox.height);
    }
    clipPath.appendChild(clipRect);
    defs.appendChild(clipPath);

    const stripe = document.createElementNS('http://www.w3.org/2000/svg','path');
    stripe.setAttribute('d', p);
    stripe.setAttribute('fill', colors[i]);
    stripe.setAttribute('stroke', '#fff');
    stripe.setAttribute('stroke-width', '1.2');
    stripe.setAttribute('clip-path', `url(#${clipId})`);
    g.appendChild(stripe);
  }
  svg.appendChild(g);
}

function addLabels(svg){
  const mergeCallao = document.getElementById('merge-callao').checked;
  DEPTS.forEach(dept => {
    if(SMALL_DEPTS.has(dept)) return;
    const c = DEPT_CENTERS[dept];
    if(!c) return;
    const hasCases = diseases.length > 0 && diseases.some((_, i) => {
      const v = parseInt(deptData[dept]?.[i]) || 0;
      const vCallao = (mergeCallao && dept === 'Lima') ? (parseInt(deptData['Callao']?.[i]) || 0) : 0;
      return (v + vCallao) > 0;
    });
    if(!hasCases) return;
    const t = document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x', c[0]);
    t.setAttribute('y', c[1]);
    t.setAttribute('text-anchor', 'middle');
    t.setAttribute('dominant-baseline', 'middle');
    t.setAttribute('font-size', '12');
    t.setAttribute('font-family', 'DM Sans, sans-serif');
    t.setAttribute('fill', '#111');
    t.setAttribute('font-weight', '600');
    t.setAttribute('pointer-events', 'none');
    const name = dept.length > 12 ? dept.substring(0,11)+'…' : dept;
    t.textContent = name;
    svg.appendChild(t);
  });
}

// ─── TOOLTIP ──────────────────────────────────────────────
function showTip(e, dept){
  const mergeCallao = document.getElementById('merge-callao').checked;
  const effectiveDept = (mergeCallao && dept === 'Callao') ? 'Lima' : dept;
  const displayName = (mergeCallao && dept === 'Callao') ? 'Lima-Callao' : dept;
  const tip = document.getElementById('tooltip');
  let lines = [`<strong>${displayName}</strong>`];
  if(diseases.length > 0){
    diseases.forEach((d, i) => {
      const v = parseInt(deptData[effectiveDept]?.[i]) || 0;
      if(v > 0) lines.push(`${d.name||'E'+(i+1)}: <strong>${v.toLocaleString()}</strong> casos`);
    });
    if(lines.length === 1) lines.push('<span style="color:#aaa">sin casos registrados</span>');
  }
  tip.innerHTML = lines.join('<br>');
  tip.style.display = 'block';
  tip.style.left = (e.clientX + 14) + 'px';
  tip.style.top  = (e.clientY - 10) + 'px';
}
function hideTip(){ document.getElementById('tooltip').style.display='none'; }

// ─── LEYENDA ──────────────────────────────────────────────
function renderLegend(items){
  const card = document.getElementById('legend-card');
  const grid = document.getElementById('legend-grid');
  if(!items || items.length === 0){ card.style.display='none'; return; }
  card.style.display = 'block';

  grid.innerHTML = '';
  const multiClass = diseases.filter(d=>d.name).length >= 2 ? ' multi' : '';
  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'legend-item' + multiClass;
    div.innerHTML = `<div class="legend-dot" style="background:${item.color}"></div><span>${item.label}</span>`;
    grid.appendChild(div);
  });
}

// ─── EXPORTAR PNG ─────────────────────────────────────────
function exportPNG(){
  const mapCard = document.getElementById('map-card');
  const legendCard = document.getElementById('legend-card');

  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:fixed;left:-9999px;top:0;background:#fff;padding:24px;font-family:DM Sans,sans-serif;width:620px';

  const svgClone = document.getElementById('peru-map').cloneNode(true);
  svgClone.style.cssText = 'width:560px;height:auto;display:block;margin:0 auto';
  wrap.appendChild(svgClone);

  if(legendCard.style.display !== 'none'){
    const legClone = legendCard.cloneNode(true);
    legClone.style.cssText = 'margin-top:12px;border:0.5px solid #ddd;border-radius:10px;padding:12px 16px;background:#fff';
    wrap.appendChild(legClone);
  }

  document.body.appendChild(wrap);

  html2canvas(wrap, {
    backgroundColor: '#ffffff',
    scale: 2,
    useCORS: true,
    logging: false
  }).then(canvas => {
    const link = document.createElement('a');
    const names = diseases.map(d=>d.name||'enfermedad').join('-');
    link.download = `mapa-peru-${names || 'epidemiologico'}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    document.body.removeChild(wrap);
  });
}

// ─── EXPORTAR SVG ─────────────────────────────────────────
function exportSVG(){
  const svgEl = document.getElementById('peru-map');
  const serial = new XMLSerializer();
  const svgStr = '<?xml version="1.0" encoding="utf-8"?>\n' + serial.serializeToString(svgEl);
  const blob = new Blob([svgStr], {type:'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const names = diseases.map(d=>d.name||'enfermedad').join('-');
  a.href = url;
  a.download = `mapa-peru-${names||'epidemiologico'}.svg`;
  a.click();
  URL.revokeObjectURL(url);
}

// ─── LIMPIAR ──────────────────────────────────────────────
function clearAll(){
  if(!confirm('¿Limpiar todos los datos y el mapa?')) return;
  deptData = {};
  diseases = [];
  initDeptData();
  renderDiseaseList();
  renderDeptTable();
  document.getElementById('peru-map').innerHTML = '';
  document.getElementById('legend-card').style.display = 'none';

  document.getElementById('mode-badge').textContent = 'sin datos';
  document.getElementById('mode-badge').className = '';
}

// ─── IMPORTAR CSV ─────────────────────────────────────────
function importCSV(){
  document.getElementById('csv-input').click();
}

function handleCSV(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    const lines = e.target.result.split('\n').filter(l=>l.trim());
    if(lines.length < 2){ alert('CSV inválido. Debe tener encabezado y al menos una fila.'); return; }
    const headers = lines[0].split(',').map(h=>h.trim());
    // Formato esperado: Departamento, Enfermedad1, Enfermedad2, ...
    const diseaseNames = headers.slice(1);
    diseases = diseaseNames.map((name, i) => ({
      name, color: PRESET_COLORS[i % PRESET_COLORS.length]
    }));
    deptData = {};
    initDeptData();
    for(let i=1;i<lines.length;i++){
      const cols = lines[i].split(',').map(c=>c.trim());
      const dept = cols[0];
      if(DEPTS.includes(dept)){
        if(!deptData[dept]) deptData[dept] = {};
        diseaseNames.forEach((_, di) => {
          const v = parseInt(cols[di+1]) || 0;
          if(v > 0) deptData[dept][di] = v;
        });
      }
    }
    renderDiseaseList();
    renderDeptTable();
    renderMap();
    alert(`CSV cargado: ${diseaseNames.length} enfermedad(es), datos importados correctamente.`);
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ─── LIMA-CALLAO MERGE ────────────────────────────────────
function onMergeCallaoChange(){
  renderDeptTable();
  if(document.getElementById('peru-map').children.length > 0) renderMap();
}

initDeptData();
addDisease();
renderDeptTable();
loadSVG();
